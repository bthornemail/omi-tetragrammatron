<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OMI Tetragrammatron — Digital Twin Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a14; color: #c8d0e0; font-family: 'Courier New', monospace; overflow: hidden; }
  #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
  #twin-info {
    position: fixed; top: 12px; left: 12px;
    background: rgba(10,10,20,0.85); border: 1px solid #334;
    border-radius: 6px; padding: 12px 16px;
    font-size: 12px; line-height: 1.6;
    min-width: 240px; z-index: 10;
    backdrop-filter: blur(4px);
  }
  .info-grid { display: flex; flex-direction: column; gap: 2px; }
  .info-grid b { color: #88aacc; }
  .info-loading { color: #667; font-style: italic; }
  .frame-us { color: #c83c3c; }
  .frame-gs { color: #3cc83c; }
  .frame-rs { color: #3c3cc8; }
  .frame-fs { color: #3cc8c8; }
  #ring-bar-container {
    position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
    width: 60%; max-width: 600px; height: 20px;
    background: rgba(10,10,20,0.85); border: 1px solid #334;
    border-radius: 4px; overflow: hidden; z-index: 10;
    font-size: 10px; line-height: 20px; text-align: center;
  }
  #ring-bar {
    height: 100%; background: linear-gradient(90deg, #1a3366, #4488cc);
    transition: width 0.5s ease; white-space: nowrap; overflow: hidden;
  }
  #controls-hint {
    position: fixed; bottom: 44px; right: 12px;
    color: #445; font-size: 10px; z-index: 10; text-align: right;
  }
  #smith-toggle {
    position: fixed; bottom: 340px; left: 192px;
    background: rgba(10,10,20,0.85); border: 1px solid #334;
    color: #88aacc; font-family: 'Courier New', monospace;
    font-size: 10px; padding: 3px 8px; border-radius: 4px;
    cursor: pointer; z-index: 10;
  }
  #smith-toggle:hover { background: rgba(30,30,60,0.9); border-color: #557; }
  #smith-canvas {
    position: fixed; bottom: 50px; left: 12px;
    width: 280px; height: 280px;
    border: 1px solid #1a1a2e; border-radius: 6px;
    z-index: 10; background: rgba(10,10,20,0.8);
    backdrop-filter: blur(4px); cursor: crosshair;
  }
  #smith-tooltip {
    position: fixed; display: none;
    background: rgba(10,10,20,0.9); border: 1px solid #334;
    border-radius: 4px; padding: 6px 10px; font-size: 10px;
    z-index: 11; pointer-events: none;
  }
  @media (max-width: 600px) {
    #twin-info { font-size: 10px; min-width: 160px; padding: 8px 10px; }
    #ring-bar-container { width: 90%; }
  }
</style>
</head>
<body>
<div id="canvas-container"></div>
<div id="twin-info"><div class="info-loading">Waiting for ring data...</div></div>
<div id="ring-bar-container"><div id="ring-bar">0 / 5040</div></div>
<div id="controls-hint">drag to orbit · scroll to zoom</div>
<canvas id="smith-canvas" width="560" height="560"></canvas>
<div id="smith-tooltip"></div>
<button id="smith-toggle">Z→Y</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* OrbitControls for r128 — adapted from three@0.160.0 examples/jsm */
THREE.OrbitControls = (function() {
  var _ORBIT = '_orbit';
  var STATE = { NONE: -1, ROTATE: 0, DOLLY: 1, PAN: 2, TOUCH_ROTATE: 3, TOUCH_DOLLY: 4, TOUCH_PAN: 5 };
  function OrbitControls(object, domElement) {
    this.object = object;
    this.domElement = domElement !== undefined ? domElement : document;
    this.enabled = true;
    this.target = new THREE.Vector3();
    this.enableDamping = false;
    this.dampingFactor = 0.05;
    this.enableZoom = true;
    this.zoomSpeed = 1.0;
    this.enableRotate = true;
    this.rotateSpeed = 1.0;
    this.enablePan = true;
    this.panSpeed = 1.0;
    this.screenSpacePanning = false;
    this.maxPolarAngle = Math.PI;
    this.minPolarAngle = 0;
    var scope = this;
    var spherical = new THREE.Spherical();
    var sphericalDelta = new THREE.Spherical();
    var scale = 1;
    var panOffset = new THREE.Vector3();
    var rotateStart = new THREE.Vector2();
    var rotateEnd = new THREE.Vector2();
    var rotateDelta = new THREE.Vector2();
    var dollyStart = new THREE.Vector2();
    var dollyEnd = new THREE.Vector2();
    var dollyDelta = new THREE.Vector2();
    var panStart = new THREE.Vector2();
    var panEnd = new THREE.Vector2();
    var panDelta = new THREE.Vector2();
    var state = STATE.NONE;
    function getAutoRotationAngle() { return 2 * Math.PI / 60 / 60 * scope.autoRotateSpeed; }
    function getZoomScale() { return Math.pow(0.95, scope.zoomSpeed); }
    function rotateLeft(angle) { sphericalDelta.theta -= angle; }
    function rotateUp(angle) { sphericalDelta.phi -= angle; }
    var panLeft = (function() {
      var v = new THREE.Vector3();
      return function panLeft(distance, objectMatrix) {
        v.setFromMatrixColumn(objectMatrix, 0);
        v.multiplyScalar(-distance);
        panOffset.add(v);
      };
    })();
    var panUp = (function() {
      var v = new THREE.Vector3();
      return function panUp(distance, objectMatrix) {
        if (scope.screenSpacePanning === true) { v.setFromMatrixColumn(objectMatrix, 1); }
        else { v.setFromMatrixColumn(objectMatrix, 0); v.crossVectors(scope.object.up, v); }
        v.multiplyScalar(distance);
        panOffset.add(v);
      };
    })();
    var panOffsetS = new THREE.Vector3();
    function pan(deltaX, deltaY) {
      var element = scope.domElement === document ? scope.domElement.body : scope.domElement;
      if (scope.object.isPerspectiveCamera) {
        var position = scope.object.position;
        var offset = position.clone().sub(scope.target);
        var targetDistance = offset.length();
        targetDistance *= Math.tan((scope.object.fov / 2) * Math.PI / 180.0);
        panLeft(2 * deltaX * targetDistance / element.clientHeight, scope.object.matrix);
        panUp(2 * deltaY * targetDistance / element.clientHeight, scope.object.matrix);
      } else if (scope.object.isOrthographicCamera) {
        panLeft(deltaX * (scope.object.right - scope.object.left) / scope.object.zoom / element.clientWidth, scope.object.matrix);
        panUp(deltaY * (scope.object.top - scope.object.bottom) / scope.object.zoom / element.clientHeight, scope.object.matrix);
      } else { console.warn('OrbitControls: unsupported camera type'); }
    }
    function dollyIn(dollyScale) { if (scope.object.isPerspectiveCamera) { scale /= dollyScale; } else if (scope.object.isOrthographicCamera) { scope.object.zoom = Math.max(0.01, scope.object.zoom / dollyScale); scope.object.updateProjectionMatrix(); } }
    function dollyOut(dollyScale) { if (scope.object.isPerspectiveCamera) { scale *= dollyScale; } else if (scope.object.isOrthographicCamera) { scope.object.zoom = Math.max(0.01, scope.object.zoom * dollyScale); scope.object.updateProjectionMatrix(); } }
    this.update = function() {
      var position = scope.object.position;
      offset.copy(position).sub(scope.target);
      offset.applyQuaternion(quat);
      spherical.setFromVector3(offset);
      if (scope.autoRotate && state === STATE.NONE) { rotateLeft(getAutoRotationAngle()); }
      spherical.theta += sphericalDelta.theta;
      spherical.phi += sphericalDelta.phi;
      spherical.phi = Math.max(scope.minPolarAngle, Math.min(scope.maxPolarAngle, spherical.phi));
      spherical.makeSafe();
      spherical.radius *= scale;
      spherical.radius = Math.max(spherical.radius, 0.001);
      scope.target.add(panOffset);
      offset.setFromSpherical(spherical);
      offset.applyQuaternion(quat.invert());
      position.copy(scope.target).add(offset);
      scope.object.lookAt(scope.target);
      if (scope.enableDamping === true) { sphericalDelta.theta *= (1 - scope.dampingFactor); sphericalDelta.phi *= (1 - scope.dampingFactor); panOffset.multiplyScalar(1 - scope.dampingFactor); } else { sphericalDelta.set(0, 0, 0); panOffset.set(0, 0, 0); }
      scale = 1;
    };
    var offset = new THREE.Vector3();
    var quat = new THREE.Quaternion().setFromUnitVectors(object.up, new THREE.Vector3(0, 1, 0));
    var quatInverse = quat.clone().invert();
    var lastPosition = new THREE.Vector3();
    function onMouseDown(event) { if (!scope.enabled) return; event.preventDefault(); if (event.button === 0) { state = STATE.ROTATE; rotateStart.set(event.clientX, event.clientY); } else if (event.button === 1) { state = STATE.PAN; panStart.set(event.clientX, event.clientY); } else if (event.button === 2) { state = STATE.DOLLY; dollyStart.set(event.clientX, event.clientY); } if (scope.domElement !== document) { scope.domElement.addEventListener('mousemove', onMouseMove, false); scope.domElement.addEventListener('mouseup', onMouseUp, false); } }
    function onMouseMove(event) { if (!scope.enabled) return; event.preventDefault(); if (state === STATE.ROTATE) { rotateEnd.set(event.clientX, event.clientY); rotateDelta.subVectors(rotateEnd, rotateStart); rotateLeft(2 * Math.PI * rotateDelta.x / scope.domElement.clientHeight); rotateUp(2 * Math.PI * rotateDelta.y / scope.domElement.clientHeight); rotateStart.copy(rotateEnd); } else if (state === STATE.DOLLY) { dollyEnd.set(event.clientX, event.clientY); dollyDelta.subVectors(dollyEnd, dollyStart); if (dollyDelta.y > 0) { dollyIn(getZoomScale()); } else if (dollyDelta.y < 0) { dollyOut(getZoomScale()); } dollyStart.copy(dollyEnd); } else if (state === STATE.PAN) { panEnd.set(event.clientX, event.clientY); panDelta.subVectors(panEnd, panStart); pan(panDelta.x, panDelta.y); panStart.copy(panEnd); } }
    function onMouseUp() { if (!scope.enabled) return; state = STATE.NONE; if (scope.domElement !== document) { scope.domElement.removeEventListener('mousemove', onMouseMove); scope.domElement.removeEventListener('mouseup', onMouseUp); } }
    function onMouseWheel(event) { if (!scope.enabled || !scope.enableZoom) return; event.preventDefault(); if (event.deltaY < 0) { dollyOut(getZoomScale()); } else if (event.deltaY > 0) { dollyIn(getZoomScale()); } }
    this.domElement.addEventListener('contextmenu', function(event) { event.preventDefault(); }, false);
    this.domElement.addEventListener('mousedown', onMouseDown, false);
    this.domElement.addEventListener('wheel', onMouseWheel, false);
    this.domElement.addEventListener('touchstart', function() {}, false);
  }
  return OrbitControls;
})();
</script>

<script src="geometry-decoder.js"></script>
<script src="ring-loader.js"></script>
<script src="twin-viewer.js"></script>

<script>
(function() {
  const container = document.getElementById('canvas-container');
  const viewer = new TwinViewer(container);
  viewer.animate();

  const loader = new RingLoader('');

  /* Load initial frame, then stream via WS/SSE */
  async function init() {
    try {
      const frame = await loader.fetchFrame();
      viewer.update(frame);
    } catch (e) {
      console.log('Initial fetch failed, will retry via stream...');
    }
    loader.onUpdate(frame => viewer.update(frame));
    loader.connect();  /* auto-detect: WS → SSE → polling */
  }
  init();

  /* Z/Y toggle */
  document.getElementById('smith-toggle').addEventListener('click', () => {
    document.dispatchEvent(new CustomEvent('smith-toggle'));
    const btn = document.getElementById('smith-toggle');
    btn.textContent = btn.textContent === 'Z→Y' ? 'Y→Z' : 'Z→Y';
  });
})();
</script>
</body>
</html>
